<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1F3864">
  <title>Flip Walkthrough</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="app-header">
    <h1 id="headerTitle">Flip Walkthrough</h1>
    <button class="header-btn" id="headerBtn" style="display:none" onclick="goHome()">Home</button>
  </header>

  <!-- ═══ HOME SCREEN ═══ -->
  <div id="screen-home" class="screen active">
    <div id="propList" class="prop-list"></div>
    <button class="btn-primary" onclick="newProperty()">+ New Walkthrough</button>
  </div>

  <!-- ═══ PROPERTY INFO SCREEN ═══ -->
  <div id="screen-property" class="screen">
    <div class="form-card">
      <h3>Property Details</h3>
      <div class="form-row">
        <div class="form-group full">
          <label>Address</label>
          <input type="text" id="propAddress" placeholder="123 Main St, Buffalo NY" autocomplete="off" oninput="onPropFieldChange()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Total Sq Ft</label>
          <input type="number" id="propSqft" placeholder="1400" inputmode="numeric" autocomplete="off" oninput="onPropFieldChange()">
        </div>
        <div class="form-group">
          <label>Ceiling Height (ft)</label>
          <input type="number" id="propCeiling" value="8" inputmode="decimal" autocomplete="off" oninput="onPropFieldChange()">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Purchase Price ($)</label>
          <input type="number" id="propPurchase" placeholder="85000" inputmode="numeric" autocomplete="off" oninput="onPropFieldChange()">
        </div>
        <div class="form-group">
          <label>ARV ($)</label>
          <input type="number" id="propARV" placeholder="160000" inputmode="numeric" autocomplete="off" oninput="onPropFieldChange()">
        </div>
      </div>
    </div>

    <div class="form-card">
      <h3>Cost Tier</h3>
      <div class="tier-toggle" id="tierToggle">
        <button data-tier="low">Low</button>
        <button data-tier="mid" class="active">Mid</button>
        <button data-tier="high">High</button>
      </div>
      <p style="font-size:12px;color:var(--text-light)">Controls which price level is used from the Buffalo cost database. Switch anytime — all costs recalculate instantly.</p>
    </div>

    <button class="btn-primary" onclick="startWalkthrough()">Start Walkthrough</button>
  </div>

  <!-- ═══ WALKTHROUGH SCREEN ═══ -->
  <div id="screen-walkthrough" class="screen">
    <div class="room-pills" id="roomPills"></div>
    <div id="roomContent"></div>
    <div class="grand-total-bar">
      <span class="label">Grand Total</span>
      <span class="amount" id="grandTotal">$0</span>
    </div>
  </div>

  <!-- ═══ SUMMARY SCREEN ═══ -->
  <div id="screen-summary" class="screen">
    <table class="summary-table" id="summaryTable"></table>

    <div class="deal-card" id="dealCard">
      <h3>Deal Analysis</h3>
      <div class="form-row" style="margin-bottom:12px">
        <div class="form-group">
          <label>Holding Costs ($)</label>
          <input type="number" id="dealHolding" value="0" inputmode="numeric" onchange="updateDeal()">
        </div>
        <div class="form-group">
          <label>Closing Buy ($)</label>
          <input type="number" id="dealCloseBuy" value="0" inputmode="numeric" onchange="updateDeal()">
        </div>
      </div>
      <div class="form-row" style="margin-bottom:16px">
        <div class="form-group">
          <label>Closing Sell ($)</label>
          <input type="number" id="dealCloseSell" value="0" inputmode="numeric" onchange="updateDeal()">
        </div>
      </div>
      <div id="dealRows"></div>
    </div>

    <button class="btn-primary btn-export" onclick="exportPDF()">Export PDF Report</button>
  </div>

  <!-- TAB BAR -->
  <nav class="tab-bar">
    <button onclick="showTab('home')" id="tab-home" class="active">
      <span class="tab-icon">&#127968;</span>Home
    </button>
    <button onclick="showTab('property')" id="tab-property">
      <span class="tab-icon">&#128203;</span>Info
    </button>
    <button onclick="showTab('walkthrough')" id="tab-walkthrough">
      <span class="tab-icon">&#128270;</span>Walk
    </button>
    <button onclick="showTab('summary')" id="tab-summary">
      <span class="tab-icon">&#128200;</span>Summary
    </button>
  </nav>

  <script src="js/costs.js"></script>
  <script src="js/walkthrough.js"></script>
  <script src="js/storage.js"></script>
  <script src="lib/jspdf.umd.min.js"></script>
  <script src="js/export.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
